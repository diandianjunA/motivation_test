dim = 1024; 向量维度
max_points_to_insert = 2000000; 最大点数容量
build_R = 48; 初始SSD图最大度
build_L = 150; 初始SSD构建列表
build_B = 8; 搜索期内存预算(GB)
build_M = 16; 构建期内存预算(GB)
build_threads = 16; 初始SSD构建线程数
search_L = 800; 查询搜索列表
beamwidth = 8; 磁盘搜索beamwidth
num_search_threads = 16; 查询线程数
nodes_to_cache = 0; 预缓存节点数
L_mem = 192; 内存增量索引L
R_mem = 64; 内存增量索引R
alpha_mem = 1.2; 内存增量索引alpha
L_disk = 150; 磁盘层合并L
R_disk = 48; 磁盘层合并R
alpha_disk = 1.2; 磁盘层合并alpha
C = 100; 剪枝候选上限
merge_threshold = 500000; 触发merge的内存索引大小
single_file_index = false; 多文件索引前缀
metric = l2; 距离度量
