dim = 1024; 向量维度
max_elements_to_insert = 75000000; 最大元素数量，给动态写入预留容量，避免测试初期触发扩容
M = 64; 图最大出边数
ef_construction = 320; 构建 ef
ef_search = 220; 搜索 ef
num_threads = 24; 构建/插入线程数
random_seed = 100; 随机种子
seed_build_size = 250000; 首批建图大小
batch_size = 150000; 后续分批插入大小
allow_replace_deleted = false; 是否复用删除槽位
