dim = 1024; 向量维度
max_points_to_insert = 2000000; 动态插入容量上限
build_R = 48; 初始磁盘图最大度
build_L = 150; 初始磁盘图构建列表
build_B = 8; PQ 压缩字节数
build_M = 16; 构建期内存预算(GB)
build_threads = 16; 初始构建线程数，降低分片构建阶段的资源峰值
force_sharded_build = true; 保持M不变，但跳过易被杀掉的one-shot构建
partition_replication_factor = 1; 降低分片构建阶段的中间数据放大
search_L = 750; 查询搜索列表
beamwidth = 4; Direct Insert / 查询共用 beam width
num_threads = 16; 运行时线程数
L_mem = 192; 静态内存入口索引L，和 FreshDiskANN 口径保持一致
R_mem = 64; 静态内存入口索引R，和 FreshDiskANN 口径保持一致
alpha_mem = 1.2; 静态内存入口索引alpha
C_mem = 100; 静态内存入口索引候选上限
L_disk = 150; merge 阶段 L_disk
R_disk = 0; merge 阶段 R_disk，OdinANN direct-insert 路径保持 0
alpha_disk = 1.2; merge 阶段 alpha
C = 384; merge 阶段候选上限
search_mem_L = 192; 查询时静态内存入口返回候选数
use_mem_index = true; 是否启用 _mem.index
single_file_index = false; 多文件磁盘索引
search_mode = beam; pipe/page/beam，默认 beam
metric = l2; 距离度量
