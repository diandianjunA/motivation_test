dim = 1024; 向量维度
max_points_to_insert = 6000000; 动态插入容量上限
build_R = 48; 初始磁盘图最大度
build_L = 170; 初始磁盘图构建列表，5M 时适当提高图质量
build_B = 8; PQ 压缩字节数
build_M = 32; 构建期内存预算(GB)
build_threads = 16; 初始构建线程数，降低分片构建阶段的资源峰值
force_sharded_build = true; 保持M不变，但跳过易被杀掉的one-shot构建
search_L = 650; 查询搜索列表，较 1M 略增以维持召回
beamwidth = 4; Direct Insert / 查询共用 beam width
num_threads = 16; 运行时线程数
L_mem = 208; 静态内存入口索引L，随规模增加提高入口质量
R_mem = 64; 静态内存入口索引R，和 FreshDiskANN 口径保持一致
alpha_mem = 1.2; 静态内存入口索引alpha
C_mem = 110; 静态内存入口索引候选上限
L_disk = 170; merge 阶段 L_disk
R_disk = 0; merge 阶段 R_disk
alpha_disk = 1.2; merge 阶段 alpha
C = 416; merge 阶段候选上限
search_mem_L = 208; 查询时静态内存入口返回候选数
use_mem_index = true; 是否启用 _mem.index
single_file_index = false; 多文件磁盘索引
search_mode = beam; pipe/page/beam，默认 beam
metric = l2; 距离度量
