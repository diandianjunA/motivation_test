dim = 1024; 向量维度
max_points_to_insert = 50000000; 与 FreshDiskANN 对齐的容量上限
build_R = 48; 与 FreshDiskANN 对齐的初始图最大度
build_L = 150; 与 FreshDiskANN 对齐的初始构建列表
build_B = 8; 与 FreshDiskANN 对齐的构建参数
build_M = 16; 与 FreshDiskANN 对齐的构建期内存预算(GB)
build_threads = 32; 与 FreshDiskANN 对齐的初始构建线程数
force_sharded_build = false; 关闭 OdinANN 特有的分片构建偏置
partition_replication_factor = 0; 关闭 OdinANN 特有的分片复制
search_L = 800; 与 FreshDiskANN 对齐的查询搜索列表
beamwidth = 8; 与 FreshDiskANN 对齐的查询 beamwidth
num_threads = 16; 与 FreshDiskANN 的查询线程数对齐
L_mem = 192; 与 FreshDiskANN 对齐
R_mem = 64; 与 FreshDiskANN 对齐
alpha_mem = 1.2; 与 FreshDiskANN 对齐
C_mem = 100; 与 FreshDiskANN 的 C 对齐
L_disk = 150; 与 FreshDiskANN 对齐
R_disk = 48; 与 FreshDiskANN 对齐
alpha_disk = 1.2; 与 FreshDiskANN 对齐
C = 100; 与 FreshDiskANN 对齐
search_mem_L = 0; 关闭 OdinANN 特有的静态内存入口索引
use_mem_index = false; 关闭 OdinANN 特有的 _mem.index 加速
single_file_index = false; 多文件磁盘索引
search_mode = beam; 使用 beam search 搜索模式
metric = l2; 距离度量
