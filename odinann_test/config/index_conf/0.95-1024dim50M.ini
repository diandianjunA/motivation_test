dim = 1024; 向量维度
max_points_to_insert = 60000000; 动态插入容量上限
build_R = 64; 初始磁盘图最大度，50M 需要更高连通度
build_L = 220; 初始磁盘图构建列表
build_B = 8; PQ 压缩字节数
build_M = 128; 构建期内存预算(GB)
build_threads = 16; 初始构建线程数，降低分片构建阶段的资源峰值
force_sharded_build = true; 保持M不变，但跳过易被杀掉的one-shot构建
search_L = 1400; 查询搜索列表，大规模下显著增加搜索深度
beamwidth = 6; Direct Insert / 查询共用 beam width，温和提高避免写入代价过大
num_threads = 16; 运行时线程数
L_mem = 256; 静态内存入口索引L，参考 FreshDiskANN 的大规模设置
R_mem = 64; 静态内存入口索引R，和 FreshDiskANN 口径保持一致
alpha_mem = 1.2; 静态内存入口索引alpha
C_mem = 140; 静态内存入口索引候选上限
L_disk = 220; merge 阶段 L_disk
R_disk = 0; merge 阶段 R_disk
alpha_disk = 1.2; merge 阶段 alpha
C = 512; merge 阶段候选上限
search_mem_L = 256; 查询时静态内存入口返回候选数
use_mem_index = true; 是否启用 _mem.index
single_file_index = false; 多文件磁盘索引
search_mode = beam; pipe/page/beam，默认 beam
metric = l2; 距离度量
