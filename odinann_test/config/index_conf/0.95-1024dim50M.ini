dim = 1024; 向量维度
max_points_to_insert = 60000000; 动态插入容量上限
build_R = 48; 初始磁盘图最大度
build_L = 150; 初始磁盘图构建列表
build_B = 8; PQ 压缩字节数
build_M = 96; 构建期内存预算(GB)
build_threads = 16; 初始构建线程数
search_L = 200; 查询搜索列表
beamwidth = 4; Direct Insert / 查询共用 beam width
num_threads = 16; 运行时线程数
L_disk = 150; merge 阶段 L_disk
R_disk = 0; merge 阶段 R_disk
alpha_disk = 1.2; merge 阶段 alpha
C = 384; merge 阶段候选上限
search_mem_L = 0; 不加载静态内存入口索引
use_mem_index = false; 是否启用 _mem.index
single_file_index = false; 多文件磁盘索引
search_mode = pipe; pipe/page/beam，默认 pipe
metric = l2; 距离度量
